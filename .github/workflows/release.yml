name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Check tag matches application version
        shell: pwsh
        run: |
          $appVersion = python -c "from version import __version__; print(__version__)"
          if ("v$appVersion" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match version.py ($appVersion)"
          }
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Build Windows executable
        run: python -m PyInstaller --noconfirm --clean ActPilot.spec
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ActPilot-PoE1.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
